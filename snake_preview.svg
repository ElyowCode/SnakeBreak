  <text x="40" y="42" font-family="Arial, sans-serif" font-size="24" fill="#2b2b2b">Snake style preview</text>
  <text x="40" y="70" font-family="Arial, sans-serif" font-size="14" fill="#5a5a5a">Blocky green segments, rounded corners, simple face (Google Snake-inspired)</text>

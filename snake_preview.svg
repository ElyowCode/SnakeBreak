    <rect x="80" y="96" width="28" height="28" rx="5" fill="#7CB342"/>
    <rect x="112" y="96" width="28" height="28" rx="5" fill="#8BC34A"/>
    <rect x="144" y="96" width="28" height="28" rx="5" fill="#7CB342"/>
    <rect x="176" y="96" width="28" height="28" rx="5" fill="#8BC34A"/>
    <rect x="208" y="96" width="28" height="28" rx="5" fill="#7CB342"/>
    <rect x="240" y="96" width="28" height="28" rx="5" fill="#8BC34A"/>
    <rect x="272" y="96" width="28" height="28" rx="5" fill="#7CB342"/>
    <rect x="304" y="96" width="28" height="28" rx="5" fill="#8BC34A"/>

    <!-- Head -->
    <rect x="336" y="96" width="28" height="28" rx="6" fill="#66BB6A"/>
    <circle cx="346" cy="106" r="2.4" fill="#1b1b1b"/>
    <circle cx="354" cy="106" r="2.4" fill="#1b1b1b"/>
